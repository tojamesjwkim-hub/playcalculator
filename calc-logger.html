<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calc Logger</title>
<link rel="apple-touch-icon" href="calc-logger-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Calc">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  body { font-family: Arial, sans-serif; color: #000; display: flex; flex-direction: column; min-height: 100vh; position: relative; background: #fff; }
  #bg { position: fixed; inset: 0; z-index: -1; background-color: #fff; background-size: cover; background-position: center; }

  .head { border-bottom: 1px solid #000; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,.6); }
  .head h1 { font-size: 16px; }
  .titleinput { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; border: none; border-bottom: 1px solid #999; background: rgba(255,255,255,.5); padding: 4px 2px; flex: 1 1 auto; min-width: 0; margin-right: 10px; }
  .gear { width: 30px; height: 30px; border: 1px solid #000; background: rgba(255,255,255,.7); font-size: 16px; line-height: 28px; text-align: center; cursor: pointer; }

  .rows { flex: 0 0 auto; padding: 8px 0; }
  .row { display: flex; align-items: center; gap: 5px; padding: 5px 10px; }
  .row input.lbl { flex: 1 1 auto; min-width: 0; font-family: Arial, sans-serif; font-size: 13px; border: none; border-bottom: 1px solid #999; padding: 4px 2px; background: rgba(255,255,255,.5); }
  .row input.num, .row input.mult { width: 48px; font-family: Arial, sans-serif; font-size: 14px; border: 1px solid #000; padding: 4px; text-align: right; background: rgba(255,255,255,.6); }
  .row .x { font-size: 14px; }
  .row .opbtn { width: 26px; height: 28px; border: 1px solid #000; background: rgba(255,255,255,.7); font-size: 15px; font-weight: bold; cursor: pointer; padding: 0; }
  .row .rowval { width: 60px; text-align: right; font-size: 14px; font-weight: bold; }
  .row .mv { display: flex; flex-direction: column; }
  .row .mv button { font-family: Arial; font-size: 9px; line-height: 1; width: 20px; height: 15px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; padding: 0; }
  .row .rm { width: 22px; height: 26px; border: 1px solid #000; background: rgba(255,255,255,.6); font-size: 14px; cursor: pointer; }

  .addrow { margin: 6px 10px; font-family: Arial, sans-serif; font-size: 13px; padding: 7px 12px; border: 1px solid #000; background: rgba(255,255,255,.6); cursor: pointer; }

  .totalbar { border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 14px; background: rgba(255,255,255,.6); display: flex; align-items: baseline; justify-content: space-between; }
  .totalbar .tlabel { font-size: 12px; }
  .totalbar .tval { font-size: 34px; font-weight: bold; }
  .totalbar input.unit { width: 70px; font-family: Arial, sans-serif; font-size: 13px; border: 1px solid #000; padding: 4px; background: rgba(255,255,255,.7); }

  .logarea { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; background: rgba(255,255,255,.5); border-bottom: 1px solid #000; }
  .logarea input.note { font-family: Arial, sans-serif; font-size: 14px; border: 1px solid #000; padding: 9px; background: rgba(255,255,255,.7); }
  .logarea button { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; padding: 14px; border: none; background: #000; color: #fff; cursor: pointer; }
  .logarea button:active { background: #444; }

  .logged { flex: 1 1 auto; background: rgba(255,255,255,.4); }
  .logged .lh { display: flex; justify-content: space-between; padding: 8px 14px; font-size: 11px; font-weight: bold; background: rgba(243,243,243,.85); border-bottom: 1px solid #ccc; }
  .logged .lrow { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-bottom: 1px solid #ddd; font-size: 14px; }
  .logged .lrow .lv { font-weight: bold; }
  .logged .lrow .ln { flex: 1 1 auto; color: #333; font-size: 13px; }
  .logged .lrow .lt { font-size: 11px; color: #888; }
  .logged .lrow .ld { font-size: 12px; text-decoration: underline; cursor: pointer; }
  .logged .empty { padding: 12px 14px; font-size: 13px; color: #555; }

  .tools { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px 14px; }
  .tools button { font-family: Arial, sans-serif; font-size: 12px; padding: 7px 11px; border: 1px solid #000; background: rgba(255,255,255,.7); cursor: pointer; }

  .panel { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 10; }
  .panel.open { display: flex; }
  .panel .card { background: #fff; width: 88%; max-width: 340px; border: 1px solid #000; padding: 16px; }
  .panel h3 { font-size: 15px; margin-bottom: 10px; }
  .panel label { font-size: 12px; font-weight: bold; display: block; margin: 12px 0 4px; }
  .panel input[type=range] { width: 100%; }
  .panel .sw { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .panel .sw div { width: 28px; height: 28px; border: 1px solid #000; cursor: pointer; }
  .panel .pbtn { font-family: Arial, sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid #000; background: #fff; cursor: pointer; margin-top: 6px; }
  .panel .prow { display: flex; gap: 8px; margin-top: 14px; }
  .panel .prow button { flex: 1; font-family: Arial; font-size: 13px; padding: 9px; border: 1px solid #000; background: #fff; cursor: pointer; }
  .panel .prow .primary { background: #000; color: #fff; }
  .panel .note-sm { font-size: 11px; color: #666; margin-top: 8px; }
</style>
</head>
<body>
  <div id="bg"></div>
  <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none">

  <div class="head">
    <input id="title" class="titleinput" type="text" placeholder="title">
    <div class="gear" id="gear">&#9881;</div>
  </div>

  <div class="rows" id="rows"></div>
  <button class="addrow" id="addRow">+ add row</button>

  <div class="totalbar">
    <input class="unit" id="prefix" type="text" placeholder="prefix" style="width:60px;margin-right:8px;">
    <div style="flex:1 1 auto;"><div class="tlabel">TOTAL</div><div class="tval" id="total">0</div></div>
    <input class="unit" id="unit" type="text" placeholder="unit">
  </div>

  <div class="logarea">
    <input class="note" id="logNote" type="text" placeholder="note (optional)">
    <button id="logBtn">LOG TOTAL</button>
  </div>

  <div class="logged" id="logged"></div>

  <div class="tools">
    <button id="exportBtn">Export CSV</button>
    <button id="importBtn">Import CSV</button>
    <button id="clearLog">Clear logged</button>
  </div>

  <div class="panel" id="panel">
    <div class="card">
      <h3>Background</h3>
      <label>Color</label>
      <input type="color" id="bgColor" value="#ffffff">
      <div class="sw" id="sw"></div>
      <label>Or upload image</label>
      <button class="pbtn" id="upBtn">choose photo</button>
      <input type="file" id="bgFile" accept="image/*" style="display:none">
      <label>Opacity <span id="opV">12%</span></label>
      <input type="range" id="op" min="0" max="100" value="12">
      <div class="note-sm">Uploaded images are downscaled to fit device storage.</div>
      <div class="prow"><button id="clr">Clear</button><button class="primary" id="done">Done</button></div>
    </div>
  </div>

<script>
(function(){
  var APP_ID = 'calc';
  var mem = {};
  function k(key){ return APP_ID+':'+key; }
  function store(key,val){ try{ if(val===undefined) return localStorage.getItem(k(key)); localStorage.setItem(k(key),val); }catch(e){ if(val===undefined) return (k(key) in mem)?mem[k(key)]:null; mem[k(key)]=val; } }
  function loadJSON(key,d){ var v=store(key); if(v==null) return d; try{ return JSON.parse(v); }catch(e){ return d; } }
  function saveJSON(key,o){ store(key, JSON.stringify(o)); }

  var rows = loadJSON('rows', [ {label:'', num:0, op:'\u00d7', mult:1} ]);
  var logged = loadJSON('logged', []);
  var unit = store('unit') || '';
  var prefix = store('prefix') || '';
  var title = store('title') || 'Calc Logger';
  var bg = loadJSON('bg', {type:'color', color:'#ffffff', url:'', opacity:12});

  // ---- background ----
  var bgEl = document.getElementById('bg');
  function mix(hex,op){ var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); r=Math.round(255+(r-255)*op);g=Math.round(255+(g-255)*op);b=Math.round(255+(b-255)*op); return 'rgb('+r+','+g+','+b+')'; }
  function applyBg(){ var op=bg.opacity/100; if(bg.type==='image'&&bg.url){ bgEl.style.backgroundColor='#fff'; bgEl.style.backgroundImage='url("'+bg.url+'")'; bgEl.style.opacity=op; } else { bgEl.style.backgroundImage='none'; bgEl.style.opacity=1; bgEl.style.backgroundColor=mix(bg.color||'#ffffff',op); } }

  // ---- rows ----
  var rowsEl = document.getElementById('rows');
  function rowValue(r){
    var n=parseFloat(r.num)||0;
    var m=(r.mult===''||r.mult==null)?1:(parseFloat(r.mult)||0);
    var op=r.op||'\u00d7';
    if(op==='\u00d7') return n*m;
    if(op==='\u00f7') return m===0?0:n/m;
    if(op==='+') return n+m;
    if(op==='\u2212') return n-m;
    return n*m;
  }
  function renderRows(){
    rowsEl.innerHTML='';
    rows.forEach(function(r, i){
      var row=document.createElement('div'); row.className='row';

      var lbl=document.createElement('input'); lbl.className='lbl'; lbl.type='text'; lbl.placeholder='label'; lbl.value=r.label||'';
      lbl.addEventListener('input', function(){ r.label=lbl.value; saveJSON('rows',rows); });

      var num=document.createElement('input'); num.className='num'; num.type='number'; num.inputMode='decimal'; num.value=r.num; 
      num.addEventListener('input', function(){ r.num=num.value; saveJSON('rows',rows); update(); });

      var ops=['\u00d7','\u00f7','+','\u2212'];
      var opbtn=document.createElement('button'); opbtn.className='opbtn'; opbtn.textContent=r.op||'\u00d7';
      opbtn.addEventListener('click', function(){ var ci=ops.indexOf(r.op||'\u00d7'); r.op=ops[(ci+1)%ops.length]; opbtn.textContent=r.op; saveJSON('rows',rows); update(); });

      var mult=document.createElement('input'); mult.className='mult'; mult.type='number'; mult.inputMode='decimal'; mult.value=r.mult;
      mult.addEventListener('input', function(){ r.mult=mult.value; saveJSON('rows',rows); update(); });

      var val=document.createElement('span'); val.className='rowval'; val._i=i;

      var mv=document.createElement('div'); mv.className='mv';
      var up=document.createElement('button'); up.textContent='\u25b2'; up.addEventListener('click', function(){ if(i>0){ var t=rows[i-1]; rows[i-1]=rows[i]; rows[i]=t; saveJSON('rows',rows); renderRows(); update(); } });
      var dn=document.createElement('button'); dn.textContent='\u25bc'; dn.addEventListener('click', function(){ if(i<rows.length-1){ var t=rows[i+1]; rows[i+1]=rows[i]; rows[i]=t; saveJSON('rows',rows); renderRows(); update(); } });
      mv.appendChild(up); mv.appendChild(dn);

      var rm=document.createElement('button'); rm.className='rm'; rm.textContent='\u00d7';
      rm.addEventListener('click', function(){ rows.splice(i,1); if(!rows.length) rows.push({label:'',num:0,op:'\u00d7',mult:1}); saveJSON('rows',rows); renderRows(); update(); });

      row.appendChild(lbl); row.appendChild(num); row.appendChild(opbtn); row.appendChild(mult); row.appendChild(val); row.appendChild(mv); row.appendChild(rm);
      rowsEl.appendChild(row);
      r._valEl=val;
    });
    update();
  }
  document.getElementById('addRow').addEventListener('click', function(){ rows.push({label:'',num:0,op:'\u00d7',mult:1}); saveJSON('rows',rows); renderRows(); });

  var totalEl=document.getElementById('total');
  function fmt(n){ return (Math.round(n*100)/100).toLocaleString(); }
  function update(){
    var t=0;
    rows.forEach(function(r){ var v=rowValue(r); t+=v; if(r._valEl) r._valEl.textContent=fmt(v); });
    totalEl.textContent = (prefix?prefix:'') + fmt(t) + (unit?(' '+unit):'');
  }

  // ---- title ----
  var titleEl=document.getElementById('title'); titleEl.value=title;
  titleEl.addEventListener('input', function(){ title=titleEl.value; store('title',title); });

  // ---- unit + prefix ----
  var unitEl=document.getElementById('unit'); unitEl.value=unit;
  unitEl.addEventListener('input', function(){ unit=unitEl.value.trim(); store('unit',unit); update(); });
  var prefixEl=document.getElementById('prefix'); prefixEl.value=prefix;
  prefixEl.addEventListener('input', function(){ prefix=prefixEl.value; store('prefix',prefix); update(); });

  // ---- logging ----
  var logNote=document.getElementById('logNote');
  function currentTotal(){ var t=0; rows.forEach(function(r){ t+=rowValue(r); }); return Math.round(t*100)/100; }
  document.getElementById('logBtn').addEventListener('click', function(){
    var entry={ total: currentTotal(), prefix: prefix, unit: unit, note: logNote.value.trim(), ts: Date.now() };
    logged.push(entry); saveJSON('logged',logged); logNote.value=''; renderLogged();
    if(navigator.vibrate) navigator.vibrate(15);
  });

  var loggedEl=document.getElementById('logged');
  function renderLogged(){
    if(!logged.length){ loggedEl.innerHTML='<div class="empty">Nothing logged yet.</div>'; return; }
    var html='<div class="lh"><span>LOGGED TOTALS</span><span>'+logged.length+'</span></div>';
    html+=logged.slice().reverse().map(function(e){
      var idx=logged.indexOf(e);
      var d=new Date(e.ts); var hh=('0'+d.getHours()).slice(-2), mm=('0'+d.getMinutes()).slice(-2);
      var dateStr=(d.getMonth()+1)+'/'+d.getDate();
      return '<div class="lrow"><span class="lv">'+(e.prefix||'')+fmt(e.total)+(e.unit?(' '+e.unit):'')+'</span><span class="ln">'+(e.note||'')+'</span><span class="lt">'+dateStr+' '+hh+':'+mm+'</span><span class="ld" data-del="'+idx+'">del</span></div>';
    }).join('');
    loggedEl.innerHTML=html;
    loggedEl.querySelectorAll('[data-del]').forEach(function(x){ x.addEventListener('click', function(){ logged.splice(parseInt(x.dataset.del),1); saveJSON('logged',logged); renderLogged(); }); });
  }
  document.getElementById('clearLog').addEventListener('click', function(){ if(confirm('Clear all logged totals?')){ logged=[]; saveJSON('logged',logged); renderLogged(); } });

  // ---- CSV export/import (logged totals) ----
  function csvCell(s){ s=String(s==null?'':s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
  function exportCSV(){
    var rowsOut=[['date','time','total','prefix','unit','note']];
    logged.slice().sort(function(a,b){ return a.ts-b.ts; }).forEach(function(e){ var d=new Date(e.ts); rowsOut.push([(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear(), ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2), e.total, e.prefix||'', e.unit||'', e.note||'']); });
    var csv=rowsOut.map(function(r){ return r.map(csvCell).join(','); }).join('\n');
    var blob=new Blob([csv],{type:'text/csv'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='calc-logger-export.csv'; a.click();
  }
  function parseCSV(text){ var rows=[],row=[],cur='',inq=false; for(var i=0;i<text.length;i++){ var ch=text[i]; if(inq){ if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inq=false; } else cur+=ch; } else { if(ch==='"') inq=true; else if(ch===',') { row.push(cur); cur=''; } else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; } else if(ch==='\r'){} else cur+=ch; } } if(cur.length||row.length){ row.push(cur); rows.push(row); } return rows; }
  function importCSV(text){
    var rows=parseCSV(text).filter(function(r){ return r.length && r.join('').trim().length; });
    if(!rows.length){ alert('Empty file.'); return; }
    var start=0; if((rows[0][0]||'').toLowerCase().indexOf('date')!==-1) start=1;
    var imported=[];
    for(var i=start;i<rows.length;i++){ var r=rows[i]; var total=parseFloat(r[2]); if(isNaN(total)) continue; var ts=Date.parse((r[0]||'')+' '+(r[1]||'')); if(isNaN(ts)) ts=Date.now(); imported.push({ total: total, prefix:(r[3]||'').trim(), unit:(r[4]||'').trim(), note:(r[5]||'').trim(), ts: ts }); }
    if(!imported.length){ alert('No valid rows. Expected: date,time,total,prefix,unit,note'); return; }
    if(!confirm('Found '+imported.length+' logged totals.\nOK = REPLACE current logged list.\nCancel = keep current.')) return;
    var seen={},merged=[]; imported.forEach(function(e){ var key=e.ts+'|'+e.total; if(!seen[key]){ seen[key]=1; merged.push(e); } });
    merged.sort(function(a,b){ return a.ts-b.ts; });
    logged=merged; saveJSON('logged',logged); renderLogged(); alert('Imported '+logged.length+'.');
  }
  document.getElementById('exportBtn').addEventListener('click', exportCSV);
  document.getElementById('importBtn').addEventListener('click', function(){ document.getElementById('csvFile').click(); });
  document.getElementById('csvFile').addEventListener('change', function(e){ var f=e.target.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ importCSV(String(rd.result)); e.target.value=''; }; rd.readAsText(f); });

  // ---- panel ----
  var panel=document.getElementById('panel');
  document.getElementById('gear').addEventListener('click', function(){ document.getElementById('op').value=bg.opacity; document.getElementById('opV').textContent=bg.opacity+'%'; if(bg.color) document.getElementById('bgColor').value=bg.color; panel.classList.add('open'); });
  document.getElementById('bgColor').addEventListener('input', function(e){ bg.type='color'; bg.color=e.target.value; bg.url=''; applyBg(); });
  document.getElementById('op').addEventListener('input', function(e){ bg.opacity=parseInt(e.target.value); document.getElementById('opV').textContent=bg.opacity+'%'; applyBg(); });
  var swc=['#ffd6d6','#ffe9c7','#fff7c7','#d6f5d6','#d6ecff','#e3d6ff','#ffd6f0','#e8e8e8'];
  var swEl=document.getElementById('sw'); swc.forEach(function(c){ var d=document.createElement('div'); d.style.background=c; d.addEventListener('click', function(){ bg.type='color'; bg.color=c; bg.url=''; applyBg(); }); swEl.appendChild(d); });
  document.getElementById('upBtn').addEventListener('click', function(){ document.getElementById('bgFile').click(); });
  document.getElementById('bgFile').addEventListener('change', function(e){ var f=e.target.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ var img=new Image(); img.onload=function(){ var mw=720,sc=Math.min(1,mw/img.width),w=Math.round(img.width*sc),h=Math.round(img.height*sc); var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h); try{ bg.type='image'; bg.url=cv.toDataURL('image/jpeg',0.7); applyBg(); }catch(err){ alert('Could not process image.'); } }; img.src=rd.result; }; rd.readAsDataURL(f); e.target.value=''; });
  document.getElementById('clr').addEventListener('click', function(){ bg={type:'color',color:'#ffffff',url:'',opacity:12}; document.getElementById('bgColor').value='#ffffff'; document.getElementById('op').value=12; document.getElementById('opV').textContent='12%'; applyBg(); });
  document.getElementById('done').addEventListener('click', function(){ saveJSON('bg',bg); panel.classList.remove('open'); });
  panel.addEventListener('click', function(e){ if(e.target===panel){ saveJSON('bg',bg); panel.classList.remove('open'); } });

  // ---- init ----
  applyBg(); renderRows(); renderLogged();
})();
</script>
</body>
</html>
